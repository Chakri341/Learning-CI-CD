name: Project 5 - Multi Job CI

on:
  push:
    branches: ["main"]

jobs:

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 3-multi-jobs/p5-multi-job

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint


  test:
    runs-on: ubuntu-latest
    needs: lint   # 👈 runs AFTER lint
    defaults:
      run:
        working-directory: 3-multi-jobs/p5-multi-job

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test


  build:
    runs-on: ubuntu-latest
    needs: test   # 👈 runs AFTER test
    defaults:
      run:
        working-directory: 3-multi-jobs/p5-multi-job

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: echo "Build successful 🚀"