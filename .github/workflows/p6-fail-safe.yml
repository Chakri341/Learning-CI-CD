name: Project 6 - Fail Safe CI

#on:
#  push:
#    branches: ["main"]

on:
  workflow_dispatch

jobs:

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 3-multi-jobs/p6-fail-safe

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint


  test:
    runs-on: ubuntu-latest
    needs: lint
    if: success()   # 👈 IMPORTANT
    defaults:
      run:
        working-directory: 3-multi-jobs/p6-fail-safe

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test


  build:
    runs-on: ubuntu-latest
    needs: test
    if: success()   # 👈 IMPORTANT
    defaults:
      run:
        working-directory: 3-multi-jobs/p6-fail-safe

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: echo "Build completed 🚀"