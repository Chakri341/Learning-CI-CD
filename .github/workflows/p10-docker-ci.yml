name: Project 10 - Docker CI

# on:
#   push:
#     branches: ["main"]

on:
  workflow_dispatch

jobs:
  docker-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 5-docker/p10-docker-ci

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t imchakri341/p10-docker-ci:latest .

      - name: Push Docker Image
        run: docker push imchakri341/p10-docker-ci:latest