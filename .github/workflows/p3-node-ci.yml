name: Project 3 - Node CI

on:
  push:
    branches: ["main"]

jobs:
  node-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 2-real-ci/p3-node-ci

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Done
        run: echo "Node CI Passed ✅"