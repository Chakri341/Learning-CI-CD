name: Project 4 - React CI

on:
  push:
    branches: ["main"]

jobs:
  react-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 2-real-ci/p4-react-ci

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Build React App
        run: npm run build

      - name: Done
        run: echo "React CI Passed ✅"